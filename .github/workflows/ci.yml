name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy pyright pytest
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: mypy
        run: mypy src/scperteval
      - name: pyright
        run: pyright src/scperteval
      - name: pytest
        run: pytest -q

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install --group docs
      - name: Build HTML docs
        run: sphinx-build -b html -W -n docs docs/_build/html
